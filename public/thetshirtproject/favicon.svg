<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Centaurus constellation — favicon glyph -->
  <rect width="64" height="64" rx="12" fill="#0B1126"/>

  <defs>
    <radialGradient id="fav-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#F4D06F" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#F4D06F" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#F4D06F" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- connecting lines -->
  <g stroke="#C9D1E8" stroke-opacity="0.32" stroke-width="0.7" stroke-linecap="round">
    <line x1="9"  y1="9"  x2="17" y2="19"/>
    <line x1="17" y1="19" x2="32" y2="14"/>
    <line x1="32" y1="14" x2="40" y2="27"/>
    <line x1="24" y1="32" x2="40" y2="27"/>
    <line x1="40" y1="27" x2="44" y2="39"/>
    <line x1="44" y1="39" x2="50" y2="44"/>
    <line x1="44" y1="39" x2="32" y2="50"/>
    <line x1="50" y1="44" x2="56" y2="56"/>
  </g>

  <!-- glow halos behind α and β Centauri -->
  <circle cx="50" cy="44" r="6" fill="url(#fav-glow)"/>
  <circle cx="56" cy="56" r="8" fill="url(#fav-glow)"/>

  <!-- stars -->
  <circle cx="9"  cy="9"  r="0.9" fill="#DCE3F3" opacity="0.55"/>
  <circle cx="17" cy="19" r="1.2" fill="#DCE3F3" opacity="0.8"/>
  <circle cx="32" cy="14" r="1.2" fill="#DCE3F3" opacity="0.85"/>
  <circle cx="40" cy="27" r="1.4" fill="#DCE3F3" opacity="0.9"/>
  <circle cx="24" cy="32" r="1.0" fill="#DCE3F3" opacity="0.7"/>
  <circle cx="44" cy="39" r="1.2" fill="#DCE3F3" opacity="0.85"/>
  <circle cx="32" cy="50" r="1.0" fill="#DCE3F3" opacity="0.6"/>
  <circle cx="50" cy="44" r="1.9" fill="#F4D06F"/>
  <circle cx="56" cy="56" r="2.3" fill="#F4D06F"/>

  <!-- cross-spike on the brightest star -->
  <g stroke="#F4D06F" stroke-width="0.55" stroke-linecap="round" opacity="0.85">
    <line x1="56" y1="51.5" x2="56" y2="60.5"/>
    <line x1="51.5" y1="56" x2="60.5" y2="56"/>
  </g>
</svg>
