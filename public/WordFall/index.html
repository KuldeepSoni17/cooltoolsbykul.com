<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0f1424">
<title>Wordfall</title>
<style>
  :root {
    --bg: #0f1424;
    --panel: #1a2138;
    --grid: #232b47;
    --tile: #f1e4cc;
    --tile-text: #1a1a2e;
    --rare: #d4a644;
    --clear: #4ade80;
    --accent: #ef476f;
    --text: #f5f5f5;
    --muted: #94a3b8;
    --shadow: 0 2px 0 rgba(0,0,0,0.2), 0 6px 14px rgba(0,0,0,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", system-ui, sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    overflow: hidden;
    overscroll-behavior: none;
    user-select: none;
    -webkit-user-select: none;
  }

  body {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 14px;
    padding-top: max(14px, env(safe-area-inset-top));
    padding-bottom: max(14px, env(safe-area-inset-bottom));
    padding-left: max(14px, env(safe-area-inset-left));
    padding-right: max(14px, env(safe-area-inset-right));
    touch-action: none;
  }

  .game {
    width: 100%;
    max-width: min(460px, calc(100dvh - 170px));
    margin-top: clamp(8px, 4vh, 40px);
  }

  @media (min-height: 760px) {
    body { align-items: center; }
    .game { margin-top: 0; }
  }

  @media (max-height: 480px) {
    body { padding: 8px; }
    .game { margin-top: 0; max-width: min(420px, calc(100dvh - 110px)); }
    .header { margin-bottom: 6px; }
    .hint { display: none; }
    .footer { margin-top: 8px; }
    .title { font-size: 22px; }
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 12px;
    gap: 8px;
  }

  .title {
    font-size: clamp(26px, 8.5vw, 38px);
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1;
    flex-shrink: 0;
  }
  .title .accent { color: var(--accent); }

  .scores { display: flex; gap: 6px; }

  .score-box {
    background: var(--panel);
    padding: 6px 10px;
    border-radius: 9px;
    min-width: 64px;
    text-align: center;
  }
  .score-label {
    font-size: 9px;
    text-transform: uppercase;
    color: var(--muted);
    letter-spacing: 0.1em;
    font-weight: 700;
  }
  .score-value {
    font-size: 20px;
    font-weight: 800;
    margin-top: 1px;
    font-variant-numeric: tabular-nums;
    line-height: 1.1;
  }
  .score-value.bump { animation: bump 360ms ease; }
  @keyframes bump {
    0% { transform: scale(1); color: var(--text); }
    40% { transform: scale(1.18); color: var(--clear); }
    100% { transform: scale(1); color: var(--text); }
  }

  .hint {
    color: var(--muted);
    font-size: 12px;
    margin-bottom: 12px;
    text-align: center;
    letter-spacing: 0.02em;
  }

  .grid {
    background: var(--panel);
    border-radius: 14px;
    padding: 10px;
    position: relative;
    aspect-ratio: 1;
    box-shadow: var(--shadow);
  }

  .grid-cells { position: relative; width: 100%; height: 100%; }

  .cell-bg, .tile {
    position: absolute;
    border-radius: 8px;
    transition: left 140ms cubic-bezier(.25,.7,.3,1), top 140ms cubic-bezier(.25,.7,.3,1),
                opacity 220ms ease, background 240ms ease, color 240ms ease;
  }

  .cell-bg { background: var(--grid); }

  .tile {
    background: var(--tile);
    color: var(--tile-text);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    box-shadow: 0 1px 0 rgba(0,0,0,0.15);
    font-family: "SF Pro Display", system-ui, sans-serif;
    letter-spacing: -0.01em;
    padding: 0 4px;
    text-align: center;
    line-height: 1;
  }
  .tile.rare { color: var(--rare); }
  .tile.multi {
    background: linear-gradient(135deg, #f5e7c8, #d9b878);
    font-weight: 900;
    letter-spacing: -0.04em;
    color: #2a1f10;
  }
  .tile.scoring {
    background: var(--clear);
    color: white;
  }
  .tile.merge-pulse {
    animation: mergePulse 320ms cubic-bezier(.2,.8,.4,1.2);
    z-index: 2;
  }
  @keyframes mergePulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.16); }
    100% { transform: scale(1); }
  }
  .tile.shake {
    animation: shake 220ms ease;
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-3px); }
    75% { transform: translateX(3px); }
  }
  .tile.clearing {
    transform: scale(0.3);
    opacity: 0;
  }
  .tile.spawn { animation: spawn 260ms cubic-bezier(.2,.8,.4,1.2); }
  @keyframes spawn {
    0% { transform: scale(0.2); opacity: 0; }
    70% { transform: scale(1.08); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }

  .toasts {
    position: absolute;
    top: -8px;
    left: 0;
    right: 0;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    z-index: 5;
  }
  .toast {
    background: var(--accent);
    color: white;
    padding: 5px 12px;
    border-radius: 999px;
    font-weight: 700;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    animation: toast 1.4s ease forwards;
    box-shadow: 0 4px 14px rgba(239,71,111,0.4);
  }
  .toast.combo { background: var(--rare); box-shadow: 0 4px 14px rgba(212,166,68,0.4); }
  @keyframes toast {
    0% { transform: translateY(24px); opacity: 0; }
    18% { transform: translateY(0); opacity: 1; }
    78% { transform: translateY(-8px); opacity: 1; }
    100% { transform: translateY(-36px); opacity: 0; }
  }

  .footer {
    margin-top: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    min-height: 36px;
  }
  .combo-display {
    color: var(--rare);
    font-weight: 800;
    font-size: 14px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .restart {
    background: var(--accent);
    color: white;
    border: none;
    padding: 9px 16px;
    border-radius: 8px;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    letter-spacing: 0.03em;
    box-shadow: 0 2px 0 rgba(0,0,0,0.2);
  }
  .restart:active { transform: translateY(1px); box-shadow: none; }

  .overlay {
    position: absolute;
    inset: 10px;
    background: rgba(15, 20, 36, 0.94);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border-radius: 10px;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    z-index: 10;
  }
  .overlay.show { display: flex; }
  .overlay-title { font-size: 28px; font-weight: 800; }
  .overlay-sub { color: var(--muted); font-size: 14px; }
  .overlay-score { color: var(--rare); font-size: 32px; font-weight: 800; }

  .loading { color: var(--muted); text-align: center; font-size: 13px; }
</style>
</head>
<body>
<div class="game">
  <div class="header">
    <div class="title">Word<span class="accent">fall</span></div>
    <div class="scores">
      <div class="score-box"><div class="score-label">Score</div><div class="score-value" id="score">0</div></div>
      <div class="score-box"><div class="score-label">Best</div><div class="score-value" id="best">0</div></div>
    </div>
  </div>
  <div class="hint">Swipe to merge letters — build prefixes, complete words clear and score</div>
  <div class="grid" id="grid">
    <div class="grid-cells" id="grid-cells"></div>
    <div class="toasts" id="toasts"></div>
    <div class="overlay" id="overlay">
      <div class="overlay-title" id="overlay-title">No moves left</div>
      <div class="overlay-sub">Final score</div>
      <div class="overlay-score" id="overlay-score">0</div>
      <button class="restart" onclick="reset()">Play again</button>
    </div>
  </div>
  <div class="footer">
    <div class="combo-display" id="combo"></div>
    <button class="restart" onclick="reset()">New game</button>
  </div>
</div>
<script src="words.js"></script>
<script>
"use strict";

const SIZE = 5;
const GAP_PCT = 2.6; // % of grid-cells width between cells
const CELL_PCT = (100 - (SIZE - 1) * GAP_PCT) / SIZE;

// Scrabble-ish letter distribution
const LETTER_FREQ = {
  A:9, B:2, C:2, D:4, E:12, F:2, G:3, H:2, I:9, J:1, K:1, L:4, M:2,
  N:6, O:8, P:2, Q:1, R:6, S:4, T:6, U:4, V:2, W:2, X:1, Y:2, Z:1
};
const RARE = new Set(["J","K","Q","V","X","Z"]);
const LETTER_SCORE = {
  A:1,B:3,C:3,D:2,E:1,F:4,G:2,H:4,I:1,J:8,K:5,L:1,M:3,
  N:1,O:1,P:3,Q:10,R:1,S:1,T:1,U:1,V:4,W:4,X:8,Y:4,Z:10
};
const BAG = [];
for (const [l, n] of Object.entries(LETTER_FREQ)) for (let i = 0; i < n; i++) BAG.push(l);
const rand = () => BAG[Math.floor(Math.random() * BAG.length)];

const $grid = document.getElementById("grid");
const $cells = document.getElementById("grid-cells");
const $score = document.getElementById("score");
const $best = document.getElementById("best");
const $combo = document.getElementById("combo");
const $toasts = document.getElementById("toasts");
const $overlay = document.getElementById("overlay");
const $overlayScore = document.getElementById("overlay-score");

const MIN_WORD = 3;
let PREFIXES = null;
let state, animating = false;

function pctPos(r, c) {
  return {
    left: c * (CELL_PCT + GAP_PCT),
    top:  r * (CELL_PCT + GAP_PCT)
  };
}

function buildBackground() {
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      const p = pctPos(r, c);
      const bg = document.createElement("div");
      bg.className = "cell-bg";
      bg.style.left = p.left + "%";
      bg.style.top = p.top + "%";
      bg.style.width = CELL_PCT + "%";
      bg.style.height = CELL_PCT + "%";
      $cells.appendChild(bg);
    }
  }
}

function buildPrefixes() {
  PREFIXES = new Set();
  for (const w of window.WORDS) {
    for (let i = 1; i <= w.length; i++) PREFIXES.add(w.slice(0, i));
  }
}

function fontSizeFor(text) {
  const len = text.length;
  if (len <= 1) return "clamp(22px, 7.5vw, 36px)";
  if (len === 2) return "clamp(18px, 6.2vw, 30px)";
  if (len === 3) return "clamp(15px, 5vw, 25px)";
  if (len === 4) return "clamp(12px, 4vw, 20px)";
  if (len === 5) return "clamp(11px, 3.6vw, 18px)";
  return "clamp(9px, 3vw, 15px)";
}

function applyTileLook(tile) {
  tile.el.textContent = tile.text;
  tile.el.style.fontSize = fontSizeFor(tile.text);
  tile.el.classList.toggle("multi", tile.text.length >= 2);
  tile.el.classList.toggle("rare", tile.text.length === 1 && RARE.has(tile.text));
}

function makeTile(text, r, c) {
  const el = document.createElement("div");
  el.className = "tile spawn";
  const p = pctPos(r, c);
  el.style.left = p.left + "%";
  el.style.top = p.top + "%";
  el.style.width = CELL_PCT + "%";
  el.style.height = CELL_PCT + "%";
  $cells.appendChild(el);
  const tile = { text, el };
  applyTileLook(tile);
  setTimeout(() => el.classList.remove("spawn"), 280);
  return tile;
}

function placeTile(tile, r, c) {
  const p = pctPos(r, c);
  tile.el.style.left = p.left + "%";
  tile.el.style.top = p.top + "%";
}

function newGame() {
  state = {
    grid: Array.from({ length: SIZE }, () => Array(SIZE).fill(null)),
    score: 0,
    best: Number(localStorage.getItem("wordfall_best") || 0)
  };
  Array.from($cells.querySelectorAll(".tile")).forEach(n => n.remove());
  for (let i = 0; i < 6; i++) spawnRandom();
  $score.textContent = 0;
  $best.textContent = state.best;
  $combo.textContent = "";
  $overlay.classList.remove("show");
  animating = false;
}

function spawnRandom() {
  const empties = [];
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++)
      if (!state.grid[r][c]) empties.push([r, c]);
  if (!empties.length) return false;
  const [r, c] = empties[Math.floor(Math.random() * empties.length)];
  state.grid[r][c] = makeTile(rand(), r, c);
  return true;
}

// Slide a single line of tiles. Each existing tile in `tiles` may be:
//   - kept (placed at a new slot)
//   - absorbed into a neighbor via merge (tiles concatenate in reading order)
// A merged tile can NOT absorb another tile in the same swipe (one merge per tile per turn).
// Returns: { line: array(SIZE) of tile|null, merges: [{ keeper, absorbed, newText, isWord }] }
function processLine(tiles, slideToEnd) {
  tiles.forEach(t => { if (t) t.mergedThisTurn = false; });
  const result = Array(SIZE).fill(null);
  const merges = [];

  if (!slideToEnd) {
    let slot = 0;
    for (let i = 0; i < SIZE; i++) {
      const tile = tiles[i];
      if (!tile) continue;
      if (slot > 0) {
        const prev = result[slot - 1];
        if (prev && !prev.mergedThisTurn && !tile.mergedThisTurn) {
          // prev is spatially LEFT of tile in this reading
          const candidate = prev.text + tile.text;
          if (PREFIXES.has(candidate.toLowerCase())) {
            prev.mergedThisTurn = true;
            merges.push({
              keeper: prev,
              absorbed: tile,
              newText: candidate,
              isWord: window.WORDS.has(candidate.toLowerCase()) && candidate.length >= MIN_WORD
            });
            continue;
          }
        }
      }
      result[slot++] = tile;
    }
  } else {
    let slot = SIZE - 1;
    for (let i = SIZE - 1; i >= 0; i--) {
      const tile = tiles[i];
      if (!tile) continue;
      if (slot < SIZE - 1) {
        const prev = result[slot + 1];
        if (prev && !prev.mergedThisTurn && !tile.mergedThisTurn) {
          // tile (current iter) is spatially LEFT of prev
          const candidate = tile.text + prev.text;
          if (PREFIXES.has(candidate)) {
            prev.mergedThisTurn = true;
            // Spatially the keeper position stays at prev's slot.
            // Reading order: tile first, prev second.
            merges.push({
              keeper: prev,
              absorbed: tile,
              newText: candidate,
              isWord: window.WORDS.has(candidate) && candidate.length >= MIN_WORD
            });
            continue;
          }
        }
      }
      result[slot--] = tile;
    }
  }
  return { line: result, merges };
}

function slide(dir) {
  if (animating || !PREFIXES) return;

  const horizontal = dir === "left" || dir === "right";
  const slideToEnd = dir === "right" || dir === "down";
  const oldGrid = state.grid.map(row => row.slice());
  const allMerges = [];

  for (let lineIdx = 0; lineIdx < SIZE; lineIdx++) {
    const line = [];
    for (let i = 0; i < SIZE; i++) {
      line.push(horizontal ? state.grid[lineIdx][i] : state.grid[i][lineIdx]);
    }
    const { line: newLine, merges } = processLine(line, slideToEnd);
    for (let i = 0; i < SIZE; i++) {
      if (horizontal) state.grid[lineIdx][i] = newLine[i];
      else state.grid[i][lineIdx] = newLine[i];
    }
    // Locate each merge's final (r,c) in updated grid
    for (const m of merges) {
      let pos = null;
      for (let i = 0; i < SIZE && !pos; i++) {
        const r = horizontal ? lineIdx : i;
        const c = horizontal ? i : lineIdx;
        if (state.grid[r][c] === m.keeper) pos = { r, c };
      }
      allMerges.push({ ...m, pos });
    }
  }

  let moved = allMerges.length > 0;
  if (!moved) {
    outer: for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        if (oldGrid[r][c] !== state.grid[r][c]) { moved = true; break outer; }
      }
    }
  }

  if (!moved) {
    if (gridFull() && !anyMergePossible()) showGameOver();
    return;
  }

  animating = true;

  // Animate absorbed tiles to keeper positions, and all other tiles to their new positions.
  for (const m of allMerges) if (m.pos) placeTile(m.absorbed, m.pos.r, m.pos.c);
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      if (state.grid[r][c]) placeTile(state.grid[r][c], r, c);
    }
  }

  setTimeout(() => completeSlide(allMerges), 165);
}

function completeSlide(allMerges) {
  // Finalize merges: absorb DOM nodes, update keeper text, pulse, score words.
  let totalGained = 0;
  for (const m of allMerges) {
    if (m.absorbed.el && m.absorbed.el.parentNode) m.absorbed.el.remove();
    m.keeper.text = m.newText;
    applyTileLook(m.keeper);
    m.keeper.el.classList.add("merge-pulse");
    setTimeout(() => m.keeper.el.classList.remove("merge-pulse"), 320);
  }

  const wordMerges = allMerges.filter(m => m.isWord);
  if (wordMerges.length) {
    for (const m of wordMerges) {
      const gain = scoreFor(m.newText) * m.newText.length;
      totalGained += gain;
      showToast(m.newText.toUpperCase() + " +" + gain, false);
    }
    state.score += totalGained;
    $score.textContent = state.score;
    $score.classList.remove("bump");
    void $score.offsetWidth;
    $score.classList.add("bump");
    if (state.score > state.best) {
      state.best = state.score;
      localStorage.setItem("wordfall_best", state.best);
      $best.textContent = state.best;
    }

    setTimeout(() => {
      for (const m of wordMerges) {
        m.keeper.el.classList.add("scoring");
      }
      setTimeout(() => {
        for (const m of wordMerges) {
          m.keeper.el.classList.add("clearing");
          const el = m.keeper.el;
          setTimeout(() => el.remove(), 260);
          if (m.pos) state.grid[m.pos.r][m.pos.c] = null;
        }
        setTimeout(finishTurn, 280);
      }, 240);
    }, 320);
  } else {
    setTimeout(finishTurn, 200);
  }
}

function finishTurn() {
  spawnRandom();
  animating = false;
  if (gridFull() && !anyMergePossible()) showGameOver();
}

function scoreFor(text) {
  let s = 0;
  for (const ch of text) s += LETTER_SCORE[ch] || 1;
  return s;
}

function gridFull() {
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++)
      if (!state.grid[r][c]) return false;
  return true;
}

function anyMergePossible() {
  if (!PREFIXES) return true;
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE - 1; c++) {
      const a = state.grid[r][c], b = state.grid[r][c + 1];
      if (a && b && PREFIXES.has((a.text + b.text).toLowerCase())) return true;
    }
  }
  for (let c = 0; c < SIZE; c++) {
    for (let r = 0; r < SIZE - 1; r++) {
      const a = state.grid[r][c], b = state.grid[r + 1][c];
      if (a && b && PREFIXES.has((a.text + b.text).toLowerCase())) return true;
    }
  }
  return false;
}

function showGameOver() {
  $overlayScore.textContent = state.score;
  $overlay.classList.add("show");
}

function showToast(text, isCombo) {
  const t = document.createElement("div");
  t.className = "toast" + (isCombo ? " combo" : "");
  t.textContent = text;
  $toasts.appendChild(t);
  setTimeout(() => t.remove(), 1500);
}

function reset() { newGame(); }
window.reset = reset;
window.move = slide;

// Keyboard
document.addEventListener("keydown", e => {
  const map = { ArrowUp: "up", ArrowDown: "down", ArrowLeft: "left", ArrowRight: "right",
                w: "up", s: "down", a: "left", d: "right",
                W: "up", S: "down", A: "left", D: "right" };
  const dir = map[e.key];
  if (dir) { e.preventDefault(); slide(dir); }
});

// Touch swipe on grid
let touchStart = null;
$grid.addEventListener("touchstart", e => {
  if (e.touches.length === 1) {
    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }
}, { passive: true });
$grid.addEventListener("touchend", e => {
  if (!touchStart || !e.changedTouches[0]) return;
  const dx = e.changedTouches[0].clientX - touchStart.x;
  const dy = e.changedTouches[0].clientY - touchStart.y;
  const ax = Math.abs(dx), ay = Math.abs(dy);
  touchStart = null;
  if (Math.max(ax, ay) < 22) return;
  if (ax > ay) slide(dx > 0 ? "right" : "left");
  else slide(dy > 0 ? "down" : "up");
}, { passive: true });

// Mouse swipe (desktop without keyboard)
let mouseStart = null;
$grid.addEventListener("mousedown", e => {
  mouseStart = { x: e.clientX, y: e.clientY };
});
$grid.addEventListener("mouseup", e => {
  if (!mouseStart) return;
  const dx = e.clientX - mouseStart.x;
  const dy = e.clientY - mouseStart.y;
  const ax = Math.abs(dx), ay = Math.abs(dy);
  mouseStart = null;
  if (Math.max(ax, ay) < 28) return;
  if (ax > ay) slide(dx > 0 ? "right" : "left");
  else slide(dy > 0 ? "down" : "up");
});

// Boot
window.addEventListener("load", () => {
  buildBackground();
  const start = () => { buildPrefixes(); newGame(); };
  if (!window.WORDS) {
    const wait = setInterval(() => {
      if (window.WORDS) { clearInterval(wait); start(); }
    }, 50);
  } else {
    start();
  }
});
</script>
